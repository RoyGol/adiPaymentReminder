<h2>לשונית מטופלים</h2>
<p class="subtitle">Search + filter chips combined</p>

<style>
  .phone-wrap { max-width: 380px; margin: 16px auto; }
  .phone-frame { background:#1a1a2e; border-radius:16px; font-family:sans-serif; padding:16px; direction:rtl; box-shadow: 0 4px 24px #0008; }
  .patient-row { background:#0f3460; border-radius:8px; padding:11px 12px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; }
  .patient-name { color:white; font-size:13px; }
  .patient-sub { color:#a0aec0; font-size:10px; margin-top:2px; }
  .amt.owed { color:#fc8181; font-size:13px; font-weight:bold; }
  .amt.paid { color:#68d391; font-size:13px; font-weight:bold; }
  .tab-bar { display:flex; justify-content:space-around; margin-top:14px; border-top:1px solid #2d3748; padding-top:10px; }
  .tab-bar span { color:#a0aec0; font-size:11px; }
  .tab-bar span.active { color:#63b3ed; }
  .mock-search { background:#16213e; border:1px solid #2d3748; border-radius:8px; padding:8px 12px; color:#718096; font-size:12px; width:100%; box-sizing:border-box; text-align:right; margin-bottom:10px; }
  .chips { display:flex; gap:7px; margin-bottom:12px; flex-wrap:wrap; }
  .chip { background:#16213e; border:1px solid #2d3748; border-radius:20px; padding:5px 13px; font-size:11px; color:#a0aec0; cursor:pointer; }
  .chip.active { background:#3182ce22; border-color:#3182ce; color:#63b3ed; }
</style>

<div class="phone-wrap">
  <div class="phone-frame">

    <input class="mock-search" placeholder="🔍 חיפוש מטופל..." />

    <div class="chips">
      <span class="chip">כולם (8)</span>
      <span class="chip active">חייבים (5)</span>
      <span class="chip">שילם (3)</span>
    </div>

    <div class="patient-row">
      <div style="text-align:left;">
        <div class="amt owed">₪450</div>
        <div style="color:#a0aec0; font-size:9px;">3 פגישות</div>
      </div>
      <div style="text-align:right;"><div class="patient-name">מיכל גל</div><div class="patient-sub">₪150 לפגישה</div></div>
    </div>

    <div class="patient-row">
      <div style="text-align:left;">
        <div class="amt owed">₪300</div>
        <div style="color:#a0aec0; font-size:9px;">2 פגישות</div>
      </div>
      <div style="text-align:right;"><div class="patient-name">שרה כהן</div><div class="patient-sub">₪150 לפגישה</div></div>
    </div>

    <div class="patient-row">
      <div style="text-align:left;">
        <div class="amt owed">₪200</div>
        <div style="color:#a0aec0; font-size:9px;">2 פגישות</div>
      </div>
      <div style="text-align:right;"><div class="patient-name">רונית שמיר</div><div class="patient-sub">₪100 לפגישה</div></div>
    </div>

    <div class="tab-bar"><span>📅 פגישות</span><span class="active">👤 מטופלים</span></div>

  </div>
</div>
